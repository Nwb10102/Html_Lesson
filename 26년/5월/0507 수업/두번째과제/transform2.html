<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform</title>
</head>

<style>
    .container {
        width: 800px;
        height: 200px;
        margin: 20px auto;
    }

    .origin {
        width: 100px;
        height: 100px;
        float: left;
        margin: 40px
    }

    .origin > img {
        width: 100px;
        height: 100px;
    }

    #move_right:hover {
        transform:rotate(45deg);
    }

    #move_left:hover {
        transform:rotate(-45deg);
    }
</style>

<body>
    <div class="container">
        <div class="origin">
            <img src="src/tree.jpg" id="move_right">
        </div>

        <div class="origin">
            <img src="src/tree.jpg" id="move_left">
        </div>
    </div>
</body>
</html>
