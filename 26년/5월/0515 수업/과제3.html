<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    #container {
        width: 1000px;
        height: 100px;
        margin: 20px auto;
    }

    .border {
        width: 100px;
        height: 100px;
        border: 1.5px solid black;
        margin: 50px;
        float: left;
    }
    
    .box1 {
        width: 100px;
        height: 100px;
        background-color: orange;
        transition: all ease 1s;
    }

    .box1:hover {
        transform: perspective(150px) rotateX(45deg);
    }

    .box2 {
        width: 100px;
        height: 100px;
        background-color: orange;
        transition: all ease 1s;
    }

    .box2:hover {
        transform: perspective(150px) rotateY(45deg);
    }

    .box3 {
        width: 100px;
        height: 100px;
        background-color: orange;
        transition: all ease 1s;
    }

    .box3:hover {
        transform: rotate(45deg);
    }

    .box4 {
        width: 100px;
        height: 100px;
        background-color: orange;
        transition: all ease 1s;
    }

    .box4:hover {
        transform: perspective(150px) rotateX(45deg) rotateY(15deg) rotateZ(-35deg);
    }

</style>

<body>
    <div id="container">
        <div class="border">
            <div class="box1"></div>            
        </div>

        <div class="border">
            <div class="box2"></div>            
        </div>

        <div class="border">
            <div class="box3"></div>            
        </div>

        <div class="border">
            <div class="box4"></div>            
        </div>
    </div>
</body>
</html>
