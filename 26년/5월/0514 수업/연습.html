<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>애니메이션</title>
</head>

<style>
    #container {
        width: 500px;
        margin:20px auto;
    }

    .box {
        width: 100px;
        height: 100px;
        float: left;
        margin: 60px;
    }

    #greenBox {
        background-color: greenyellow;
        animation-name: green;
        animation-duration: 3s;
        animation-iteration-count: infinite;
    }

    #purpleBox {
        background-color: purple;
        animation-name: purple;
        animation-duration: 3s;
        animation-iteration-count: infinite;
    }

    @keyframes green {
        from {
            border: 1px solid transparent;
        } to {
            border: 1px solid black;
            border-radius: 50%;
        }
    }

    @keyframes purple {
        from {
            transform: rotate(0deg);
        } to {
            transform: rotate(45deg);
        }
    }
</style>

<body>
    <div id="container">
        <div class="box" id="greenBox"></div>
        <div class="box" id="purpleBox"></div>
    </div>
</body>
</html>
