<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에그머니나</title>
</head>

<style>
    body {
        background-image: url(Src/White_Corner_Piece_Halftone.png);
        background-repeat: repeat;
        font-family: "나눔 고딕";
    }

    h1 {
        color: white;
        background-color: black;
        height: 60px;
        text-align: center;
        margin: 20px;
        padding-top: 10px;
        box-shadow: 5px 5px 3px 3px gray;
    }

    img {
        width: 40%;
        height: 40%;
        border-radius: 10px;
        margin-left: 25%;
    }

    p {
        font-weight: bold;
        font-size: 20px;
    }

    h2 {
        border-radius: 10px;
        background-color: black;
        color: white;
        width: 100px;
        height: 40px;
        text-align: center;
    }

    ul {
        background-color: pink;
        border: 2px dotted;
        list-style: circle;
        padding-top: 10px;
        padding-bottom: 10px;
        width: 90%;
    }

    ol {
        line-height: 1.5;
        border: dotted 2px;
        background-color: yellow;
        padding-top: 10px;
        padding-bottom: 10px;
        width: 90%;
        border-bottom-right-radius: 30px;
        border-top-left-radius: 30px;
    }
</style>

<body>
    <h1>에그 스크램블 (Scrambled Eggs)</h1>

    <img src="Src/에그.jpg"><br>

    <p>다음은 스크램블 에그를 만드는 방법입니다</p>

    <h2>재료</h2>

    <ul>
        <li>주재료 : 계란 2개, 우유 1/4컵</li>
        <li>부재료 : 버터, 소금 약간</li>
    </ul>

    <h2>방법</h2>

    <ol>
        <li>버터를 중간 정도로 달구어진 후라이팬에 두른다.</li>
        <li>그릇에 달걀과 크림을 섞는다.</li>
        <li>버터가 녹으면 크림과 달걀을 붓는다.</li>
        <li>달걀을 반으로 접는다.</li>
        <li>달걀이 아직도 촉촉할 때 불을 끈다.</li>
    </ol>
</body>
</html>
