<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div {
        padding: 12px 24px;
        border-top:1px solid black;
    }

    .selected {
        border-top: 0;
        color: white;
        background-color: dodgerblue;
    }

    .selected + div {
        border-top: 0;
    }
</style>


<body>
    <div>첫줄</div>
    <div>둘째줄</div>
    <div class = "selected">
        선택된 줄
    </div>
    <div>넷째줄</div>
    <div>다섯째 줄</div>
</body>
</html>
