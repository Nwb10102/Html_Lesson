<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .blue-button {
        font-size: 1em;
        padding: 16px 24px;
        color: white;
        background-color: dodgerblue;
        border: 0;
        border-radius: 4px;
        cursor: pointer;
    }

    .blue-button:hover {
        background-color: darkblue;
    }

    div {
        position: relative; display: inline-block;
        color:white; background-color: tomato;
        height: 56px; line-height: 56px; padding: 0 24px;
        cursor: pointer;
    }

    div ul {
        display: none;
        position: absolute;
        width: 100px; left: 12px; top: 56px; margin: 0; pading: 0;
    }

    div:hover ul {
        display: block;
    }

    div ul li {
        background-color: #444;
        height: 44px; line-height: 44px; text-align: center;
    }

    div ul li:hover {
        background-color: #222;
    }
</style>

<body>
    <button class = "blue-button">클릭</button>
    <br><br>

    <div>
        파일
        <ul>
            <li>저장</li>
            <li>열기</li>
            <li>닫기</li>
        </ul>
    </div>
</body>
</html>
