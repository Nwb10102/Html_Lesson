<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Animation</title>
</head>

<style>
    img {
        width: 100%;
        height: 100%;
    }

    .container {
        border: 1px solid black;
        display: inline-block;
        margin: 20px
    }

    .box1, .box2, .box3 {
        width: 100px;
        height: 150px;
    }

    .box2:hover {
        transform: scale(1, 0.5)
    }

    .box3:hover {
        transform: perspective(200px) rotateX(45deg);
    }
</style>

<body>
    <header>원본 이미지</header>
    <div class="container">
        <div class="box1"><img src="src/풍경.jpg"></div>
    </div>

    <div class="container">
        <div class="box2"><img src="src/풍경.jpg"></div>
    </div>

    <div class="container">
        <div class="box3"><img src="src/풍경.jpg"></div>
    </div>
</body>
</html>
