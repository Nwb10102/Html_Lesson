<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>translate</title>
</head>
<style>
    .red-box {
        width: 100px;
        height: 100px;
        background-color: red;
    }

    .red-box:hover {
        transform:translate(100px,200px) ;
    }
</style>

<body>
    <div class="red-box"></div>
</body>
</html>
