<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>translate</title>
</head>
<style>
    #container {
        width:500px;
        margin: 20px auto;
    }

    .box {
        width: 100px;
        height: 100px;
        float: left;
        margin: 50px;
    }

    #green_box{
        background-color: greenyellow;
        animation-name: greenBoxCorner;
        animation-duration: 5s;
        animation-fill-mode: forwards;
    }

    #purble_box {
        background-color: purple;
        animation-name: rotation;
        animation-duration: 5s;
        animation-fill-mode: forwards;
    }

    @keyframes greenBoxCorner {
        from {
            border-radius: 0%;
            border: 1px solid rgba(0, 0, 0, 0);

        }to {
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 1);
        }
    }

    @keyframes rotation {
        from {
            transform:rotate(0deg);
        }to {
            transform:rotate(45deg);
        }
    }
</style>

<body>
    <div id="container">
        <div class="box" id="green_box"></div>
        <div class="box" id="purble_box"></div>
    </div>
</body>
</html>
