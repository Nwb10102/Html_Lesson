<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        span {
            font-size: 1.2rem;
            color: white;
            background-color: tomato;
            border: 2px solid firebrick;

            position: relative;
        }
        
        span:nth-of-type(1) { top: 12px; }
        span:nth-of-type(2) { right: 12px; }
        span:nth-of-type(3) { bottom: 12px; }
        span:nth-of-type(4) { left: 12px; }
    </style>

    <span>SPAN 1</span>
    <span>SPAN 2</span>
    <span>SPAN 3</span>
    <span>SPAN 4</span>
</body>
</html>
