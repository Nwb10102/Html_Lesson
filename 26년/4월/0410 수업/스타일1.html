<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My blog</title>
</head>
<body>
    <style>
        header {
            width: 1000px;
            height: 70px;
            text-align: center;
            margin-top: 10px;
            border: 1px solid black;
            background-color: pink;
        }

        nav {
            width: 290px;
            height: 490px;
            text-align: center;
            margin-top: 10px;
            border: 1px solid black;

            float: left;
        }

        section {
            width: 700px;
            height: 490px;       /* 고정 높이(원하면 px 대신 계산된 값 사용) */
            margin-top: 10px;
            margin-left: 10px;
            border: 1px solid black;
            float: left;
            overflow: hidden;    /* section 자체 스크롤 숨김 */
            position: relative;  /* iframe 절대배치 기준 */
        }

        footer {
            width: 1000px;
            height: 70px;
            margin-top: 10px;
            border: 1px solid black;
            text-align: center;

            clear:both;
        }

        .page {
            width: 1010px;
            margin: 0 auto;
            border: 1px solid blue;
            background-color: linen;
        }

        iframe {
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .button {
            width: 100%;
            height: 50px;
            line-height: 50px;
        }

        .button:hover {
            background-color: yellow;
        }
    </style>

<div class="page">
    <header><h1>Hi</h1></header>

    <nav>
        <div class = "button"><a href="Iframe/봄꽃.html" target="frame"> 메인메뉴 1 </a></div>
        <div class = "button"><a href="https://ko.wikipedia.org/wiki/%EC%9C%84%ED%82%A4%EB%B0%B1%EA%B3%BC:%EB%8C%80%EB%AC%B8" target="frame"> 메인메뉴 2</a></div>
    </nav>

    <section>
        <iframe src="" name="frame"></iframe>
    </section>

    <footer>
        
    </footer>
</div>
</body>
</html>
